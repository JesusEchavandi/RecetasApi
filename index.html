<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recetas Peruanas | Demo API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="fondo-orbita fondo-orbita-uno" aria-hidden="true"></div>
    <div class="fondo-orbita fondo-orbita-dos" aria-hidden="true"></div>

    <header class="cabecera">
      <p class="etiqueta">API SERVERLESS EN VERCEL</p>
      <h1>Recetas Peruanas</h1>
      <p class="subtitulo">
        Interfaz de prueba para consultar listado completo, búsqueda por ID y filtro por dificultad.
      </p>
    </header>

    <main class="contenedor-principal">
      <section class="panel panel-controles">
        <h2>Controles de consulta</h2>

        <div class="grupo-campo">
          <label for="idReceta">Buscar por ID</label>
          <div class="fila-campo">
            <input id="idReceta" type="number" min="1" placeholder="Ejemplo: 1" />
            <button id="btnBuscarId" class="boton boton-secundario">Buscar</button>
          </div>
        </div>

        <div class="grupo-campo">
          <label for="filtroDificultad">Filtrar por dificultad</label>
          <div class="fila-campo">
            <select id="filtroDificultad">
              <option value="">Selecciona dificultad</option>
              <option value="Fácil">Fácil</option>
              <option value="Intermedio">Intermedio</option>
              <option value="Difícil">Difícil</option>
            </select>
            <button id="btnFiltrar" class="boton boton-secundario">Filtrar</button>
          </div>
        </div>

        <div class="acciones-principales">
          <button id="btnListar" class="boton boton-primario">Cargar todas las recetas</button>
          <button id="btnLimpiar" class="boton boton-ligero">Limpiar filtros</button>
        </div>

        <div class="estado" id="estadoApp" role="status" aria-live="polite"></div>
      </section>

      <section class="panel panel-resumen">
        <h2>Resumen</h2>
        <div class="metricas">
          <article class="metrica">
            <p class="metrica-etiqueta">Resultados</p>
            <p class="metrica-valor" id="totalResultados">0</p>
          </article>
          <article class="metrica">
            <p class="metrica-etiqueta">Última acción</p>
            <p class="metrica-valor metrica-texto" id="ultimaAccion">Sin consultas</p>
          </article>
        </div>
      </section>

      <section class="panel panel-lista">
        <h2>Recetas</h2>
        <div id="listaRecetas" class="lista-recetas"></div>
      </section>
    </main>

    <template id="plantillaTarjeta">
      <article class="tarjeta-receta">
        <img class="tarjeta-imagen" alt="Imagen del plato" />
        <div class="tarjeta-cuerpo">
          <div class="tarjeta-meta">
            <span class="chip chip-id"></span>
            <span class="chip chip-dificultad"></span>
          </div>
          <h3 class="tarjeta-titulo"></h3>
          <p class="tarjeta-descripcion"></p>
          <div class="tarjeta-datos"></div>
          <details class="detalle-receta">
            <summary>Ver ingredientes y pasos</summary>
            <div class="detalle-contenido">
              <h4>Ingredientes</h4>
              <ul class="lista-ingredientes"></ul>
              <h4>Pasos</h4>
              <ol class="lista-pasos"></ol>
            </div>
          </details>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
